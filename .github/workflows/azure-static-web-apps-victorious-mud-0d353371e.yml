name: Build And Deploy Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: solar-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build -- --configuration production

      - name: Package dist
        run: tar -czf frontend-dist.tgz -C dist/Modernize .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tgz
          if-no-files-found: error

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_HOST: 45.160.103.198
      DEPLOY_PORT: "7772"
      DEPLOY_USER: suporte

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release artifact
        run: scp -P "$DEPLOY_PORT" frontend-dist.tgz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/inovesolar-front-${{ github.sha }}.tgz"

      - name: Deploy to server
        env:
          SUDO_PASSWORD: ${{ secrets.DEPLOY_SUDO_PASSWORD }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "ARTIFACT=/tmp/inovesolar-front-${{ github.sha }}.tgz SUDO_PASSWORD='$SUDO_PASSWORD' bash -s" <<'EOF'
          set -euo pipefail

          STAMP=$(date +%Y%m%d%H%M%S)
          RELEASE_DIR="/var/www/inovesolar-front/releases/$STAMP"

          mkdir -p "$RELEASE_DIR"
          tar -xzf "$ARTIFACT" -C "$RELEASE_DIR"
          ln -sfn "$RELEASE_DIR" /var/www/inovesolar-front/current
          rm -f "$ARTIFACT"

          printf '%s\n' "$SUDO_PASSWORD" | sudo -S nginx -t
          printf '%s\n' "$SUDO_PASSWORD" | sudo -S systemctl reload nginx
          EOF
