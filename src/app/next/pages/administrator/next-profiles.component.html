<section class="next-page">
  <article class="next-page-card">
    <div class="next-toolbar">
      <label class="next-field-inline">
        <span>Buscar perfil</span>
        <input type="text" [(ngModel)]="search" placeholder="Nome do perfil" />
      </label>

      <button class="next-primary-button" type="button" (click)="openDialog('Add', {})">
        + Adicionar perfil
      </button>
    </div>
  </article>

  <article class="next-page-card">
    @if (isLoading) {
      <div class="next-empty-state">Carregando perfis...</div>
    } @else {
      <table class="next-table">
        <thead>
          <tr>
            <th>Perfil</th>
            <th>Qtd. páginas</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          @for (profile of filteredProfiles; track profile.id) {
            <tr>
              <td><strong>{{ profile.profile_name }}</strong></td>
              <td>{{ profile.countPages }}</td>
              <td>
                <div class="next-table__actions">
                  <button class="next-table__icon" type="button" (click)="openDialog('Update', profile)">✏️</button>
                  <button class="next-table__icon" type="button" (click)="openDialog('Delete', profile)">🗑️</button>
                  <button class="next-table__icon" type="button" (click)="openPagesDialog(profile)">📄</button>
                </div>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="3">
                <div class="next-empty-state">Nenhum perfil encontrado.</div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    }
  </article>
</section>
