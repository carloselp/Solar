<section class="next-page">
  <article class="next-page-card">
    <div class="next-toolbar">
      <label class="next-field-inline">
        <span>Buscar página</span>
        <input type="text" [(ngModel)]="search" placeholder="Nome, rota ou grupo" />
      </label>

      <button class="next-primary-button" type="button" (click)="openDialog('Add', {})">
        + Adicionar página
      </button>
    </div>
  </article>

  <article class="next-page-card">
    @if (isLoading) {
      <div class="next-empty-state">Carregando páginas...</div>
    } @else {
      <table class="next-table">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Rota</th>
            <th>Ícone</th>
            <th>Grupo</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          @for (page of filteredPages; track page.id) {
            <tr>
              <td><strong>{{ page.name_page }}</strong></td>
              <td>{{ page.route }}</td>
              <td>{{ page.icon }}</td>
              <td>{{ page.group_menu }}</td>
              <td>
                <div class="next-table__actions">
                  <button class="next-table__icon" type="button" (click)="openDialog('Update', page)">✏️</button>
                  <button class="next-table__icon" type="button" (click)="openDialog('Delete', page)">🗑️</button>
                </div>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="5">
                <div class="next-empty-state">Nenhuma página encontrada.</div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    }
  </article>
</section>
